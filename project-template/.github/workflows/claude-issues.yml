name: Claude Issue Triage

on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write
  id-token: write

jobs:
  triage:
    if: |
      (github.event_name == 'issues') ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # CONFIGURE: set to your base branch (main or develop)
          ref: main
          fetch-depth: 0

      - name: Install Claude Code
        run: |
          npm install -g @anthropic-ai/claude-code@latest

      - name: Acknowledge trigger
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "issue_comment" ]; then
            gh api repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions -f content=eyes
          else
            gh api repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/reactions -f content=eyes
          fi

      - name: Get issue info
        id: issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NUMBER=${{ github.event.issue.number }}
          TITLE=$(gh issue view $NUMBER --json title -q .title)
          BODY=$(gh issue view $NUMBER --json body -q .body)
          echo "number=$NUMBER" >> $GITHUB_OUTPUT
          echo "title=$TITLE" >> $GITHUB_OUTPUT
          echo "$BODY" > /tmp/issue-body.txt

      - name: Build triage prompt
        run: |
          ISSUE_BODY=$(cat /tmp/issue-body.txt)
          ISSUE_NUM="${{ steps.issue.outputs.number }}"
          ISSUE_TITLE="${{ steps.issue.outputs.title }}"

          cat > /tmp/triage-prompt.txt <<EOF
Triage issue #${ISSUE_NUM}: ${ISSUE_TITLE}

Issue body:
${ISSUE_BODY}

Repository is checked out at $(pwd). Analyze the codebase, then:
1. Analyze and produce your triage report
2. Add labels with: gh issue edit ${ISSUE_NUM} --add-label <label>
3. Estimate difficulty points (Fibonacci: 1,2,3,5,8,13) based on scope and complexity
4. Create a branch off the base branch (read from Project Config in CLAUDE.md)
5. Add to GitHub Project board if configured (just item-add, skip status/estimate)
EOF

          echo "::group::Triage prompt"
          cat /tmp/triage-prompt.txt
          echo "::endgroup::"

          echo "::group::System prompt"
          cat .claude/prompts/ci-triage.md
          echo "::endgroup::"

      - name: Run Claude triage
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Claude version: $(claude --version)"
          echo "Starting triage for issue #${{ steps.issue.outputs.number }}..."

          claude -p "$(cat /tmp/triage-prompt.txt)" \
            --print \
            --model claude-sonnet-4-6 \
            --system-prompt-file .claude/prompts/ci-triage.md \
            --max-turns 20 \
            --permission-mode bypassPermissions \
            --verbose \
            2>/tmp/triage-stderr.log \
            > /tmp/triage-output.md

          EXIT_CODE=$?
          echo "Claude exit code: ${EXIT_CODE}"

          echo "::group::Claude stderr"
          cat /tmp/triage-stderr.log || true
          echo "::endgroup::"

          echo "::group::Triage output"
          cat /tmp/triage-output.md
          echo "::endgroup::"

          if [ $EXIT_CODE -ne 0 ]; then
            echo "::error::Claude triage failed with exit code ${EXIT_CODE}"
            exit 1
          fi

          if [ ! -s /tmp/triage-output.md ]; then
            echo "::error::Claude produced empty output"
            exit 1
          fi

      - name: Comment on issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Posting triage comment to issue #${{ steps.issue.outputs.number }}..."
          gh issue comment ${{ steps.issue.outputs.number }} --body-file /tmp/triage-output.md
          echo "Done."
